name: render-demo

# Uses the shared reusable workflow from kezhu-ai/awesome-ai-history-tools.
# Local copy: ~15 lines. Previously: ~60 lines duplicated.

on:
  push:
    paths:
      - 'demo.tape'
      - '.github/workflows/render-demo.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gif:
    uses: kezhu-ai/awesome-ai-history-tools/.github/workflows/render-demo.yml@main
    with:
      tool_name: recall-ai
      demo_tape_path: ./demo.tape
      run_under_home: true
      home_dir: /tmp/demo-home
