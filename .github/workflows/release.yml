name: release

# Uses the shared reusable workflow from kezhu-ai/awesome-ai-history-tools.
# Single source of truth for all 4 kit repos' release pipelines.
# Local copy of this file: ~15 lines. Previously: ~80 lines duplicated.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    uses: kezhu-ai/awesome-ai-history-tools/.github/workflows/release.yml@main
    with:
      tool_name: recall-ai
      binary: recall
      binary_windows: recall.exe
      allow_macos_failure: true
